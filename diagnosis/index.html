  const accent = useAccent();
  const dims = size === "large"
    ? { word: "clamp(3.4rem, 12vw, 6.5rem)", heb: "clamp(4.5rem, 17vw, 9rem)" }
    : { word: "1.9rem", heb: "2.6rem" };
  return (
    <div style={{ position: "relative", display: "inline-block", lineHeight: 1 }}>
      <span className="hebrew" aria-hidden="true" style={{
        position: "absolute", top: "50%", left: "50%",
        transform: "translate(-50%, -42%)",
        fontSize: dims.heb, color: accent, opacity: 0.14,
        fontWeight: 500, letterSpacing: "0.05em",
        whiteSpace: "nowrap", pointerEvents: "none",
      }}>עֵזֶר</span>
      <span className="serif" style={{
        position: "relative", fontSize: dims.word, fontWeight: 600,
        letterSpacing: "0.14em", color: "var(--ink)",
      }}>EZER</span>
    </div>
  );
}

/* ─── PROGRESS BAR ─── */
function Progress({ current, total, moduleName }) {
  const accent = useAccent();
  const pct = Math.round((current / total) * 100);
  return (
    <div style={{ maxWidth: 640, margin: "0 auto", padding: "0 1.5rem", width: "100%" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: "0.6rem" }}>
        <span style={{ fontSize: "0.78rem", letterSpacing: "0.12em", textTransform: "uppercase", color: accent, fontWeight: 600 }}>{moduleName}</span>
        <span style={{ fontSize: "0.82rem", color: "var(--ink-soft)" }}>{current} of {total}</span>
      </div>
      <div style={{ height: 4, background: "var(--cream-deep)", borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: pct + "%", background: accent, borderRadius: 2, transition: "width 0.4s ease" }} />
      </div>
    </div>
  );
}

/* ─── TRIAGE ─── */
function Triage({ onNext }) {
  const accent = useAccent();
  const [selected, setSelected] = useState([]);

  const toggle = (id) => {
    setSelected((prev) =>
      prev.includes(id) ? prev.filter((x) => x !== id)
        : prev.length < 3 ? [...prev, id] : prev
    );
  };

  return (
    <div className="fade" style={{ maxWidth: 640, margin: "0 auto", padding: "clamp(2rem, 6vh, 4rem) 1.5rem", width: "100%" }}>
      <p className="serif" style={{ fontSize: "clamp(1.4rem, 4vw, 1.9rem)", fontWeight: 500, lineHeight: 1.4, marginBottom: "0.6rem" }}>
        Where are you feeling the weight right now?
      </p>
      <p style={{ fontSize: "0.95rem", color: "var(--ink-soft)", marginBottom: "2rem" }}>
        Pick up to 3 areas — we'll go deeper on the ones that matter most to you.
      </p>
      <div style={{ display: "flex", flexDirection: "column", gap: "0.7rem", marginBottom: "2rem" }}>
        {MODULES.map((m) => {
          const isSelected = selected.includes(m.id);
          const isDisabled = !isSelected && selected.length >= 3;
          const moduleAccent = MODULE_ACCENTS[m.id].main;
          return (
            <button
              key={m.id}
              onClick={() => toggle(m.id)}
              disabled={isDisabled}
              style={{
                display: "flex", alignItems: "flex-start", gap: "1rem",
                textAlign: "left", padding: "1rem 1.2rem",
                border: "1.5px solid " + (isSelected ? moduleAccent : "var(--line)"),
                borderRadius: 10, fontSize: "1rem", fontFamily: "inherit",
                color: isDisabled ? "var(--ink-soft)" : "var(--ink)",
                cursor: isDisabled ? "not-allowed" : "pointer",
                background: isSelected ? "var(--white-warm)" : "transparent",
                opacity: isDisabled ? 0.45 : 1,
                transition: "border-color 0.2s ease, background 0.2s ease",
              }}
            >
              <span style={{
                width: 20, height: 20, borderRadius: 4, flexShrink: 0, marginTop: 2,
                border: "2px solid " + (isSelected ? moduleAccent : "var(--line)"),
                background: isSelected ? moduleAccent : "transparent",
                display: "flex", alignItems: "center", justifyContent: "center",
                transition: "all 0.2s ease",
              }}>
                {isSelected && (

// Zone thresholds: 1-3 = low, 4-6 = mid, 7-10 = high
// Each question supplies low/mid/high reflection sentences via sliderZones
function getSliderZone(val) {
  if (val <= 3) return "low";
  if (val <= 6) return "mid";
  return "high";
}

// Zone colours: tinted versions that sit between cream and the accent
function zoneColor(accent, zone) {
  // Low = near-cream, mid = accent at 40% opacity feel, high = accent
  if (zone === "low") return "var(--cream-deep)";
  if (zone === "mid") return accent + "88"; // ~53% opacity hex
  return accent;
}

const { useEffect, useRef } = React;

function ModuleInsight({ insight, onContinue }) {
  const accent = useAccent();
  const accentDeep = insight.accentDeep || accent;

  // Animate the big stat number counting up
  const countRef = useRef(null);
  const [displayed, setDisplayed] = React.useState(insight.animateFrom ?? insight.statRaw);
  const [lineVisible, setLineVisible] = React.useState(false);
  const [bodyVisible, setBodyVisible] = React.useState(false);
  const [sourceVisible, setSourceVisible] = React.useState(false);
  const [btnVisible, setBtnVisible] = React.useState(false);

  useEffect(() => {
    // Stagger: line → body → source → button
    const t1 = setTimeout(() => setLineVisible(true), 200);
    const t2 = setTimeout(() => setBodyVisible(true), 600);
    const t3 = setTimeout(() => setSourceVisible(true), 1000);
    const t4 = setTimeout(() => setBtnVisible(true), 1300);

    // Count-up animation for numeric stats
    if (insight.animateFrom !== undefined && insight.animateTo !== undefined) {
      const duration = 900;
      const start = performance.now();
      const from = insight.animateFrom;
      const to = insight.animateTo;
      const isFloat = !Number.isInteger(to);
      const step = (now) => {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = from + (to - from) * eased;
        setDisplayed(isFloat ? current.toFixed(1) : Math.round(current));
        if (progress < 1) requestAnimationFrame(step);
        else setDisplayed(insight.statDisplay);
      };
      const raf = requestAnimationFrame(step);
      return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4); cancelAnimationFrame(raf); };
    }
    return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4); };
  }, []);

  const fadeIn = (visible, delay = 0) => ({
    opacity: visible ? 1 : 0,
    transform: visible ? "translateY(0)" : "translateY(8px)",
    transition: "opacity 0.5s ease, transform 0.5s ease",
  });

  return (
    <div style={{
      maxWidth: 600,
      margin: "0 auto",
      padding: "clamp(2rem, 7vh, 4.5rem) 1.5rem",
      width: "100%",
    }}>
      {/* Card */}
      <div style={{
        background: "var(--white-warm)",
        border: "1px solid var(--line)",
        borderTop: `4px solid ${accent}`,
        borderRadius: 12,
        padding: "clamp(1.8rem, 5vw, 2.8rem)",
        position: "relative",
        overflow: "hidden",
      }}>
        {/* Background Hebrew watermark */}
        <span className="hebrew" aria-hidden="true" style={{
          position: "absolute", bottom: "-1rem", right: "-0.5rem",
          fontSize: "8rem", color: accent, opacity: 0.055,
          fontWeight: 500, lineHeight: 1, pointerEvents: "none",
          userSelect: "none",
        }}>עֵזֶר</span>

        {/* Eyebrow label */}
        <p style={{
          fontSize: "0.72rem", letterSpacing: "0.18em",
          textTransform: "uppercase", color: accent,
          fontWeight: 600, marginBottom: "1.4rem",
        }}>
          {insight.eyebrow}
        </p>

        {/* Big stat */}
        <div className="serif" style={{
          fontSize: "clamp(3rem, 12vw, 5rem)",
          fontWeight: 600, color: accent, lineHeight: 1,
          marginBottom: "0.5rem",
        }}>

        </div>

        {/* Divider line — animated */}

          transform: lineVisible ? "scaleX(1)" : "scaleX(0)",

        {/* Pull quote / headline */}
        <p className="serif" style={{

// Normalise any answer onto the same 1–10 range as the friction slider,
// so questions with different option counts (4 vs 5 vs 10) stay comparable.
function normalizedVal(q, val) {
  const max = q.type === "slider" ? 10 : Math.max(...q.options.map((o) => o.value));
  return max > 1 ? 1 + (val - 1) * (9 / (max - 1)) : val;
}

// Score each module: higher = more friction/need
function scoreModules(answers, selectedModules) {
  const scores = {};
  MODULES.forEach((m) => {
    const isDeep = selectedModules.includes(m.id);
    const qs = isDeep ? m.deepQs : [m.diagnosticQ];
    let sum = 0, count = 0;
    qs.forEach((q) => {
      const val = answers[q.id];
      if (val != null && typeof val === "number") { sum += normalizedVal(q, val); count++; }
    });
    if (count > 0) scores[m.id] = { id: m.id, name: m.name, avg: sum / count, isDeep };
  });
  return Object.values(scores).sort((a, b) => b.avg - a.avg);
}

// Read the friction slider value for a module (returns 1–10 or null)
function frictionVal(answers, moduleId) {
  return answers[moduleId + "_friction"] ?? null;
}

// Read the honest-feel answer for a module (returns option value or null)
function feelVal(answers, moduleId) {
  return answers[moduleId + "_feel"] ?? null;
}

// Per-module: derive a one-paragraph observation from their actual answers
function moduleObservation(moduleId, answers, isDeep) {
  const friction = frictionVal(answers, moduleId);
  const feel = feelVal(answers, moduleId);

  const frictionHigh = friction !== null && friction >= 7;
  const frictionMid  = friction !== null && friction >= 4 && friction < 7;
  const frictionLow  = friction !== null && friction < 4;

  if (moduleId === "comms") {
    const reach = answers["comms_reach"];
    if (!isDeep) {
      if (reach >= 3) return "You said getting the word out is hit and miss — that's one of the quietest drains in a pastor's week. People miss things, and you carry the blame.";
      return "Communications sounds mostly under control for you.";
    }
    if (frictionHigh && feel >= 3) return "You're spending real energy on communications every week, and you're not happy with what it produces. That's a double cost — the hours, and the gap between effort and result.";
    if (frictionHigh) return "Communications is costing you a lot of time. Even if you're satisfied with the output, that energy could be going somewhere else.";
    if (frictionMid && feel >= 3) return "There's a gap between the effort you put into comms and how you feel about it. That's worth looking at — often it means the system, not the person, needs to change.";
    if (feel >= 4) return "You flagged some honest discomfort with your church's communications. That instinct is worth trusting.";
    if (frictionLow && feel <= 2) return "Communications sounds like it's mostly working for you — worth holding onto.";
    return "There are some friction points in your communications that are worth naming.";
  }

  if (moduleId === "admin") {
    const systems = answers["admin_systems"];
    if (!isDeep) {
      if (systems >= 3) return "Admin held together by memory and goodwill is a risk — not because the people aren't capable, but because it all falls apart the moment someone's unavailable.";
      return "Your admin systems sound reasonably solid.";
    }
    if (frictionHigh && feel >= 3) return "Admin is swallowing the role, and you feel it. This is the pattern we see most often — capable pastors slowly buried under the weight of things that were never meant to be theirs.";
    if (frictionHigh) return "Admin is taking up a significant slice of your week. Even if the systems work, that's hours away from ministry.";
    if (feel >= 4) return "You said admin causes you real stress, or you've stopped looking at it. Either signal matters — one is pressure, the other is a system that's been quietly abandoned.";
    if (frictionMid) return "Admin isn't overwhelming, but it's present — enough to notice, enough to chip away at the week.";
    return "Admin sounds manageable for now, but worth keeping an eye on as you grow.";
  }

  if (moduleId === "tech") {
    const confidence = answers["tech_confidence"];
    if (!isDeep) {
      if (confidence >= 3) return "You said you muddle through or panic when tech breaks. One-person dependencies are the norm in churches — but the day that person is unavailable, everything stops.";
      return "Your tech coverage sounds reasonably solid.";
    }
    if (frictionHigh && feel >= 3) return "Tech is a genuine source of stress for you, and it breaks confidence when things go wrong. That's a systems problem, not a people problem.";
    if (feel === 3) return "You flagged that you're over-reliant on one person for tech. That's the most common and most fragile setup we see — everything is fine until it isn't.";
    if (feel >= 4) return "You're behind on tech and you know it. That self-awareness is actually the hardest part — the fixing is more straightforward than it feels.";
    if (frictionMid) return "Tech is manageable day to day, but not invisible. There are gaps worth closing before they become urgent.";
    return "Tech sounds mostly under control — a few things worth tidying, but no emergency.";
  }

  if (moduleId === "compliance") {
    const confidence = answers["compliance_confidence"];
    if (!isDeep) {
      if (confidence >= 3) return "You said you have concerns or genuinely don't know where your compliance sits. In a registered charity, that uncertainty itself is a risk worth addressing.";
      return "You sound reasonably confident about compliance — that's worth protecting.";
    }
    if (frictionHigh && feel >= 3) return "Compliance is keeping you up at night, and you suspect there are gaps you can't see. That combination is exactly when it's worth getting a clearer picture.";
    if (feel === 3 || feel === 4) return "You suspect there are gaps, or it worries you more than you let on. Churches carrying compliance risk usually don't know it until something surfaces — getting across it now costs far less than fixing it later.";
    if (feel === 5) return "You said you don't know enough to answer honestly — that's actually a useful signal. It means no one has given you a clear picture of your obligations, and that's fixable.";
    if (frictionMid) return "Compliance sits in the back of your mind. That low-level worry is worth converting into a clear picture of what you actually need to do.";
    return "Compliance sounds reasonably covered — worth a periodic review as legislation keeps shifting.";
  }

  if (moduleId === "pastoral") {
    const confidence = answers["pastoral_confidence"];
    if (!isDeep) {
      if (confidence >= 3) return "You said people are falling through, or you're stretched too thin to reach everyone. That weight is one of the hardest parts of ministry — knowing there are gaps you can't close alone.";
      return "Pastoral care sounds mostly covered for now.";
    }
    if (frictionHigh && feel >= 3) return "You're carrying the weight of people falling through, and you feel it. The gap between who your church is for and what you can actually deliver is one of the most painful places to sit in ministry.";
    if (feel >= 3) return "You know there are people not being reached — either because you're stretched, or because the system doesn't surface who needs care. Both are solvable, but both need naming first.";
    if (frictionMid) return "Pastoral care is mostly landing, but there are gaps you're aware of. The ones you know about are often the tip of a quieter pattern.";
    return "Pastoral care sounds mostly solid. Worth protecting the infrastructure that makes it work.";
  }

  return "There are some things here worth looking at more closely.";
}

// Per-module: one practical next step derived from their answers
function moduleNextStep(moduleId, answers, isDeep) {
  const friction = frictionVal(answers, moduleId);
  const feel = feelVal(answers, moduleId);

  const steps = {
    comms: [
      { cond: () => feel >= 4, t: "Start with one channel", d: "Pick the one channel your people actually check, and make that excellent. Everything else is a distraction until that one works." },
      { cond: () => friction >= 7, t: "Protect your comms time", d: "Block 90 minutes once a week for communications. Reactive comms always gets worse — a scheduled slot makes it manageable." },
      { cond: () => true, t: "Audit what you're sending", d: "List every regular communication your church sends. For each one, ask: is this necessary, and who actually needs it?" },
    ],
    admin: [
      { cond: () => feel >= 4, t: "Name what's yours and what isn't", d: "Write down everything admin you did last week. Circle what genuinely needs the pastor — it's probably less than you think." },
      { cond: () => friction >= 7, t: "Find the one thing to hand off", d: "Pick the single most repeatable admin task you do each week. That's the first thing to document and delegate." },
      { cond: () => true, t: "Check what's holding together", d: "Ask: if you were unavailable for two weeks, what would break? The answer tells you exactly where to start." },
    ],
    tech: [
      { cond: () => feel === 3, t: "Map the dependency", d: "Write down every system that only one person knows how to run. That list is your risk register — start with whoever leaves soonest." },
      { cond: () => feel >= 4, t: "Don't try to catch up all at once", d: "Pick one tech thing that's causing the most friction right now. Fix that. Then the next one. Trying to overhaul everything creates paralysis." },
      { cond: () => true, t: "Do a tool audit", d: "List everything your church pays for or uses digitally. You'll likely find something you've forgotten about and something that could be replaced with something simpler." },
    ],
    compliance: [
      { cond: () => feel >= 3, t: "Get a clear picture first", d: "You can't manage compliance you can't see. Start with an ACNC self-evaluation (free, online) to find out where you actually stand." },
      { cond: () => friction >= 6, t: "Separate the urgent from the ongoing", d: "Some compliance obligations are one-off (policies, checks) and some are recurring (reporting, renewals). List them separately — the urgent list is almost always shorter than it feels." },
      { cond: () => true, t: "Check your Working With Children status", d: "For most Australian churches, this is the single most time-sensitive compliance item. Make sure everyone who needs a check has a current one." },
    ],
    pastoral: [
      { cond: () => feel >= 3, t: "Name who's invisible right now", d: "Think of three people in your church you haven't connected with in more than a month. That's your list for this week — not a system, just three names." },
      { cond: () => friction >= 7, t: "Distribute the care", d: "You can't carry everyone. Identify two or three people in your congregation who are naturally caring and give them a small, named role in pastoral follow-up." },
      { cond: () => true, t: "Close one loop this week", d: "Pick one person you've been meaning to follow up. Do it this week, before anything else. Sometimes the most important thing is also the most postponeable." },
    ],
  };

  const moduleSteps = steps[moduleId] || [];
  const matched = moduleSteps.find(s => s.cond());
  return matched || { t: "Take one small step", d: "Identify the single most pressing thing in this area and address that first." };
}

/* ─── RESULTS ─── */
function Results({ answers, selectedModules, onEmailSubmit, submitted }) {
  const accent = useAccent();

  const sortedModules = useMemo(() => scoreModules(answers, selectedModules), [answers, selectedModules]);
  const topArea = sortedModules[0] ?? null;
  const topAccent = topArea ? MODULE_ACCENTS[topArea.id].main : accent;

  // Modules with a meaningful score to show (all that have any answers)
  const scoredModules = sortedModules.filter(m => m.avg > 0);

  // Headline signal: what did the top module's friction + feel actually say?
  const topFriction = topArea ? frictionVal(answers, topArea.id) : null;
  const topFeel = topArea ? feelVal(answers, topArea.id) : null;

  // Derive a headline sentence that reflects what they actually said
  const headlineSubtitle = useMemo(() => {
    if (!topArea) return "Here are a few things worth reflecting on.";
    const name = topArea.name.toLowerCase();
    if (topFriction >= 8 && topFeel >= 4) return `You're spending a lot of energy on ${name} — and it's not sitting well. That combination is worth taking seriously.`;
    if (topFriction >= 7) return `The time and energy going into ${name} is one of the heavier things you described today.`;
    if (topFeel >= 4) return `Your gut feeling about ${name} is telling you something. That instinct is usually right.`;
    if (topFeel === 3) return `There's honest discomfort sitting in ${name}. Worth naming clearly rather than carrying quietly.`;
    return `${topArea.name} came out as the area with the most friction in what you shared today.`;
  }, [topArea, topFriction, topFeel]);

  const [email, setEmail] = useState("");
  const [church, setChurch] = useState("");
  const [churchSize, setChurchSize] = useState("");
  const [churchState, setChurchState] = useState("");
  const [err, setErr] = useState("");
  const [consent, setConsent] = useState(true);

  const submit = () => {
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      setErr("Please enter a valid email so we can send your summary.");
      return;
    }
    setErr("");
    onEmailSubmit({ email, church, churchSize, churchState, answers, selectedModules, consent });
  };

  return (
    <div className="fade" style={{ maxWidth: 640, margin: "0 auto", padding: "clamp(2rem, 7vh, 5rem) 1.5rem", width: "100%" }}>

      {/* Header */}
      <p style={{ fontSize: "0.82rem", letterSpacing: "0.14em", textTransform: "uppercase", color: topAccent, fontWeight: 600, marginBottom: "1rem", textAlign: "center" }}>
        Your Diagnosis
      </p>
      <h2 className="serif" style={{ fontSize: "clamp(1.7rem, 5vw, 2.4rem)", fontWeight: 500, lineHeight: 1.3, textAlign: "center", marginBottom: "1rem" }}>
        {topArea
          ? <>The heaviest weight looks like <span style={{ color: topAccent }}>{topArea.name.toLowerCase()}</span>.</>
          : "Thank you for your honesty."}
      </h2>
      <p style={{ fontSize: "1.05rem", color: "var(--ink-soft)", textAlign: "center", marginBottom: "2.8rem", lineHeight: 1.65 }}>
        {headlineSubtitle}
      </p>

      {/* Per-module observations */}
      {scoredModules.length > 0 && (
        <div style={{ marginBottom: "2.8rem" }}>
          {scoredModules.map((m, i) => {
            const mAccent = MODULE_ACCENTS[m.id].main;
            const obs = moduleObservation(m.id, answers, m.isDeep);
            const step = moduleNextStep(m.id, answers, m.isDeep);
            return (
              <div key={m.id} style={{
                padding: "1.4rem 0",
                borderBottom: i < scoredModules.length - 1 ? "1px solid var(--line)" : "none",
              }}>
                {/* Module label */}
                <div style={{ display: "flex", alignItems: "center", gap: "0.6rem", marginBottom: "0.6rem" }}>
                  <span style={{ width: 8, height: 8, borderRadius: "50%", background: mAccent, flexShrink: 0 }} />
                  <span style={{ fontSize: "0.75rem", letterSpacing: "0.14em", textTransform: "uppercase", color: mAccent, fontWeight: 600 }}>
                    {m.name}
                  </span>
                </div>
                {/* Observation */}
                <p style={{ fontSize: "0.98rem", color: "var(--ink)", lineHeight: 1.65, marginBottom: "0.9rem" }}>
                  {obs}
                </p>
                {/* Next step */}
                <div style={{ background: "var(--cream-deep)", borderRadius: 8, padding: "0.85rem 1rem", borderLeft: `3px solid ${mAccent}` }}>
                  <p style={{ fontSize: "0.82rem", letterSpacing: "0.1em", textTransform: "uppercase", color: mAccent, fontWeight: 600, marginBottom: "0.25rem" }}>
                    One thing this week
                  </p>
                  <p style={{ fontWeight: 600, fontSize: "0.95rem", marginBottom: "0.2rem" }}>{step.t}</p>
                  <p style={{ fontSize: "0.92rem", color: "var(--ink-soft)", lineHeight: 1.55 }}>{step.d}</p>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Email capture */}
      {!submitted ? (
        <div style={{ background: "var(--white-warm)", border: "1px solid var(--line)", borderRadius: 10, padding: "1.8rem 1.6rem" }}>
          <p className="serif" style={{ fontSize: "1.25rem", fontWeight: 500, marginBottom: "0.5rem" }}>
            Want a written summary — and a hand if you'd like one?
          </p>
          <p style={{ fontSize: "0.98rem", color: "var(--ink-soft)", marginBottom: "1.4rem" }}>
            Pop your email in and we'll send your results plus a free AI-for-churches guide. No pressure, no sales pitch — you can just reply if you'd like to talk.
          </p>
          <input type="text" placeholder="Church name (optional)" value={church} onChange={(e) => setChurch(e.target.value)} style={inputStyle} />
          <div style={{ display: "flex", gap: "0.7rem" }}>
            <select
              value={churchSize}
              onChange={(e) => setChurchSize(e.target.value)}
              style={{ ...inputStyle, flex: 1, color: churchSize ? "var(--ink)" : "var(--ink-soft)" }}
            >
              <option value="">Church size (optional)</option>
              <option value="under_50">Under 50</option>
              <option value="50_100">50–100</option>
              <option value="100_150">100–150</option>
              <option value="150_200">150–200</option>
              <option value="200_300">200–300</option>
              <option value="300_500">300–500</option>
              <option value="500_1000">500–1000</option>
              <option value="1000_plus">1000+</option>
            </select>
            <select
              value={churchState}
              onChange={(e) => setChurchState(e.target.value)}
              style={{ ...inputStyle, flex: 1, color: churchState ? "var(--ink)" : "var(--ink-soft)" }}
            >
              <option value="">State (optional)</option>
              <option value="NSW">NSW</option>
              <option value="VIC">VIC</option>
              <option value="QLD">QLD</option>
              <option value="WA">WA</option>
              <option value="SA">SA</option>
              <option value="TAS">TAS</option>
              <option value="ACT">ACT</option>
              <option value="NT">NT</option>
            </select>
          </div>
          <input type="email" placeholder="Your email" value={email} onChange={(e) => setEmail(e.target.value)} style={inputStyle} />
          {err && <p style={{ color: "var(--clay)", fontSize: "0.88rem", marginBottom: "0.8rem" }}>{err}</p>}
          <label style={{ display: "flex", alignItems: "flex-start", gap: "0.6rem", marginBottom: "1.2rem", cursor: "pointer" }}>
            <input
              type="checkbox"
              checked={consent}
              onChange={(e) => setConsent(e.target.checked)}
              style={{ marginTop: "0.2rem", width: 16, height: 16, flexShrink: 0, accentColor: topAccent }}
            />
            <span style={{ fontSize: "0.85rem", color: "var(--ink-soft)", lineHeight: 1.5 }}>
              Your answers may be included in anonymised, aggregated research about Australian churches — never identifying you or your church. Untick to opt out.
            </span>
          </label>
          <button onClick={submit} style={{ ...btnPrimary(topAccent), width: "100%" }}>Send me my summary</button>
          <p style={{ fontSize: "0.85rem", color: "var(--ink-soft)", textAlign: "center", marginTop: "1.2rem" }}>
            Prefer to reach out first? Email us any time at{" "}
            <a href={"mailto:" + EZER.contactEmail} style={{ color: topAccent, fontWeight: 600 }}>{EZER.contactEmail}</a>
          </p>
        </div>
      ) : (
        <div style={{ background: "var(--white-warm)", border: "1px solid var(--line)", borderRadius: 10, padding: "2rem 1.6rem", textAlign: "center" }}>
          <p className="serif" style={{ fontSize: "1.4rem", fontWeight: 500, marginBottom: "0.6rem" }}>It's on its way.</p>
          <p style={{ fontSize: "1rem", color: "var(--ink-soft)" }}>
            Check your inbox for your summary. We'll be in touch gently — and you're always welcome to reach us at{" "}
            <a href={"mailto:" + EZER.contactEmail} style={{ color: topAccent, fontWeight: 600 }}>{EZER.contactEmail}</a>.
          </p>
          <div className="hebrew" style={{ fontSize: "2rem", color: topAccent, opacity: 0.5, marginTop: "1.6rem" }}>עֵזֶר</div>
        </div>
      )}
    </div>
  );
}

/* ─── MAIN APP ─── */
function App() {
  const [stage, setStage] = useState("intro");
  const [selectedModules, setSelectedModules] = useState([]);
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [qIdx, setQIdx] = useState(0);
  const [showSelah, setShowSelah] = useState(false);

  const questionSequence = useMemo(() => {
    if (selectedModules.length === 0) return [];
    return MODULES.flatMap((m) => {
      const qs = selectedModules.includes(m.id) ? m.deepQs : [m.diagnosticQ];
      return qs.map((q, qi) => ({
        ...q,
        moduleId: m.id,
        moduleName: m.name,
        isLastInModule: qi === qs.length - 1,
        insight: m.insight,
      }));
    });
  }, [selectedModules]);

  const totalQ = questionSequence.length;
  const currentQ = questionSequence[qIdx];

  // Derive current accent from the active module
  const currentAccent = useMemo(() => {
    if (stage === "question" && currentQ) {
      return MODULE_ACCENTS[currentQ.moduleId]?.main ?? "#B5643C";
    }
    return "#B5643C";
  }, [stage, currentQ]);

  const handleTriageNext = (sel) => {
    setSelectedModules(sel);
    setQIdx(0);
    setShowSelah(false);
    setStage("question");
  };

  const handleAnswer = (val) => {
    setAnswers((prev) => ({ ...prev, [currentQ.id]: val }));
    if (currentQ.isLastInModule) {
      if (qIdx + 1 < totalQ) setShowSelah(true);
      else setStage("results");
    } else {
      setQIdx(qIdx + 1);
    }
  };

  const handleSelahContinue = () => {
    setShowSelah(false);
    setQIdx(qIdx + 1);
  };

  const emailSubmit = async (p) => {
    try {
      const { error } = await sb.from("leads").insert({
        email:   p.email,
        source:  "diagnosis-free",
        triage:  p.selectedModules ?? null,
        answers: { church: p.church ?? null, church_size: p.churchSize || null, state: p.churchState || null, responses: p.answers ?? null, research_consent: p.consent ?? true }
      });
      if (error) console.error("EZER lead save failed:", error);
    } catch (e) { console.error("EZER lead save failed:", e); }
    setSubmitted(true);
  };

  const isLastQ = qIdx + 1 >= totalQ;
  const insightModule = currentQ ? MODULES.find((m) => m.id === currentQ.moduleId) : null;

  const renderQuestion = () => {
    const q = currentQ;
    const initial = answers[q.id] ?? null;
    const props = { q, initial, onNext: handleAnswer, isLast: isLastQ };
    if (q.type === "multi") return <MultiSelect {...props} />;
    if (q.type === "slider") return <SliderQ {...props} />;
    if (q.type === "text") return <TextQ {...props} />;
    return <SingleSelect {...props} />;
  };

  return (
    <AccentContext.Provider value={currentAccent}>
      {stage !== "intro" && (
        <div style={{ padding: "1.4rem 1.5rem 0", display: "flex", justifyContent: "center" }}>
          <Wordmark size="small" />
        </div>
      )}
      <main style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", paddingBottom: "2rem" }}>
        {stage === "intro" && <Intro onStart={() => setStage("triage")} />}
        {stage === "triage" && <Triage onNext={handleTriageNext} />}
        {stage === "question" && !showSelah && currentQ && (
          <React.Fragment>
            <div style={{ paddingTop: "1.5rem" }}>
              <Progress current={qIdx + 1} total={totalQ} moduleName={currentQ.moduleName} />
            </div>
            {renderQuestion()}
          </React.Fragment>
        )}
        {stage === "question" && showSelah && insightModule && (
          <ModuleInsight insight={insightModule.insight} onContinue={handleSelahContinue} />
        )}
        {stage === "results" && (
          <Results answers={answers} selectedModules={selectedModules} onEmailSubmit={emailSubmit} submitted={submitted} />
        )}
      </main>
      <footer style={{ textAlign: "center", padding: "1.5rem", fontSize: "0.8rem", color: "var(--ink-soft)", borderTop: "1px solid var(--line)" }}>
        Ezer · Helping churches steward what God has given. Everything here is built with AI, directed and owned by Ryan.
      </footer>
    </AccentContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
